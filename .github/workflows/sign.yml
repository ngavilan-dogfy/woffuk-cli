name: Auto Sign

on:
  schedule:
    - cron: '10 7 * 1-3,11-12 1,2,3,4'  # Mon-Tue-Wed-Thu 08:10 (UTC+1, standard)
    - cron: '10 6 * 4-10 1,2,3,4'  # Mon-Tue-Wed-Thu 08:10 (UTC+2, DST)
    - cron: '40 12 * 1-3,11-12 1,2,3,4'  # Mon-Tue-Wed-Thu 13:40 (UTC+1, standard)
    - cron: '40 11 * 4-10 1,2,3,4'  # Mon-Tue-Wed-Thu 13:40 (UTC+2, DST)
    - cron: '32 13 * 1-3,11-12 1,2,3,4'  # Mon-Tue-Wed-Thu 14:32 (UTC+1, standard)
    - cron: '32 12 * 4-10 1,2,3,4'  # Mon-Tue-Wed-Thu 14:32 (UTC+2, DST)
    - cron: '31 16 * 1-3,11-12 1,2,3,4'  # Mon-Tue-Wed-Thu 17:31 (UTC+1, standard)
    - cron: '31 15 * 4-10 1,2,3,4'  # Mon-Tue-Wed-Thu 17:31 (UTC+2, DST)
    - cron: '30 7 * 1-3,11-12 5'  # Fri 08:30 (UTC+1, standard)
    - cron: '30 6 * 4-10 5'  # Fri 08:30 (UTC+2, DST)
    - cron: '10 14 * 1-3,11-12 5'  # Fri 15:10 (UTC+1, standard)
    - cron: '10 13 * 4-10 5'  # Fri 15:10 (UTC+2, DST)

concurrency:
  group: sign
  cancel-in-progress: true

jobs:
  sign:
    name: Sign in Woffu
    runs-on: ubuntu-latest
    steps:
      - name: Download woffux
        run: |
          curl -fsSL "https://github.com/ngavilan-dogfy/woffux/releases/latest/download/woffux-linux-amd64" -o woffux
          chmod +x woffux

      - name: Random delay (2-5 min)
        run: sleep $(( RANDOM % 181 + 120 ))

      - name: Sign
        run: ./woffux sign
        env:
          WOFFU_URL: ${{ secrets.WOFFU_URL }}
          WOFFU_COMPANY_URL: ${{ secrets.WOFFU_COMPANY_URL }}
          WOFFU_EMAIL: ${{ secrets.WOFFU_EMAIL }}
          WOFFU_PASSWORD: ${{ secrets.WOFFU_PASSWORD }}
          WOFFU_LATITUDE: ${{ secrets.WOFFU_LATITUDE }}
          WOFFU_LONGITUDE: ${{ secrets.WOFFU_LONGITUDE }}
          WOFFU_HOME_LATITUDE: ${{ secrets.WOFFU_HOME_LATITUDE }}
          WOFFU_HOME_LONGITUDE: ${{ secrets.WOFFU_HOME_LONGITUDE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
